<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gudiya Hair</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #c4b5a5;
}

/* HERO DESIGN */
.hero {
    position: relative;
    height: 600px;
    background: #c4b5a5;
}

/* Beige blocks (design ke liye) */
.block1 {
    position: absolute;
    width: 60%;
    height: 60%;
    background: #b7a597;
    top: 0;
    left: 0;
}

.block2 {
    position: absolute;
    width: 50%;
    height: 50%;
    background: #d6c7b3;
    bottom: 0;
    left: 0;
}

.block3 {
    position: absolute;
    width: 25%;
    height: 50%;
    background: #eaeaea;
    top: 0;
    right: 0;
}

/* IMAGES */
.img1 {
    position: absolute;
    top: 0;
    right: 0;
    width: 260px;
}

.img2 {
    position: absolute;
    bottom: 20px;
    left: 40px;
    width: 220px;
}

.img3 {
    position: absolute;
    bottom: 0;
    right: 20px;
    width: 220px;
}

/* MENU */
.menu-wrapper {
    background: #fff;
    max-width: 900px;
    margin: auto;
    padding: 40px;
    margin-top: -80px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.header {
    text-align: center;
}

.main-title {
    font-size: 40px;
    letter-spacing: 5px;
}

.cursive-title {
    font-family: 'Great Vibes', cursive;
    font-size: 35px;
    color: #7d6b5d;
}

.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
}

.item {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 10px;
}

.dots {
    flex: 1;
    border-bottom: 1px dotted #999;
    margin: 0 10px;
}

.price {
    font-weight: bold;
}

@media(max-width:600px){
    .menu-grid {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<!-- DESIGN AREA -->
<div class="hero">
    <div class="block1"></div>
    <div class="block2"></div>
    <div class="block3"></div>

    <img src="hair1.jpg" class="img1">
    <img src="hair2.jpg" class="img2">
    <img src="hair3.jpg" class="img3">
</div>

<!-- MENU -->
<div class="menu-wrapper">

    <div class="header">
        <h1 class="main-title">Gudiya Hair</h1>
        <div class="cursive-title">Service Menu</div>
    </div>

    <div class="menu-grid">

        <div>
            <div class="item"><span>Hair Cut</span><div class="dots"></div><span class="price">₹350</span></div>
            <div class="item"><span>Hair Spa</span><div class="dots"></div><span class="price">₹1000</span></div>
        </div>

        <div>
            <div class="item"><span>Keratin</span><div class="dots"></div><span class="price">₹2000</span></div>
            <div class="item"><span>Hair Color</span><div class="dots"></div><span class="price">₹3000</span></div>
        </div>

    </div>

</div>

</body>
</html>
